<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --brand-primary: {primary};
    --brand-secondary: {secondary};
    --brand-accent: {accent};
    --brand-background: {background};
    --brand-heading-font: "{heading_font}";
    --brand-body-font: "{body_font}";
    --safe-margin: {safe_margin}px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {width}px; height: {height}px;
    overflow: hidden; position: relative;
    font-family: var(--brand-body-font), sans-serif;
  }
  .background-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    {background_style}
    z-index: 0;
  }
  .background-layer img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .foreground-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    display: flex; justify-content: center; align-items: center;
  }
  .product-slot {
    width: 55%; height: 75%;
    display: flex; justify-content: center; align-items: center;
  }
  .product-slot img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.15));
  }
  .logo {
    position: absolute; top: var(--safe-margin);
    left: var(--safe-margin);
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--brand-primary); letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
  }
  .badge {
    position: absolute; top: var(--safe-margin);
    right: var(--safe-margin);
    background: var(--brand-accent);
    color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 6px 14px; border-radius: 2px;
    letter-spacing: 1px; text-transform: uppercase;
    z-index: 2;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: var(--brand-accent); z-index: 2;
  }
</style>
</head>
<body>
  <div class="background-layer">{background_content}</div>
  <div class="logo">{brand_name}</div>
  <div class="badge">{badge_text}</div>
  <div class="foreground-layer">
    <div class="product-slot">
      <img src="{product_image}" alt="{brand_name} product" data-asset-source="product_facts">
    </div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
