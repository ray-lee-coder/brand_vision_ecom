<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --brand-primary: {primary};
    --brand-secondary: {secondary};
    --brand-accent: {accent};
    --brand-background: {background};
    --brand-heading-font: "{heading_font}";
    --brand-body-font: "{body_font}";
    --safe-margin: {safe_margin}px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {width}px; height: {height}px;
    overflow: hidden; position: relative;
    font-family: var(--brand-body-font), sans-serif;
    background: var(--brand-background);
  }
  .background-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    {background_style}
    z-index: 0;
  }
  .background-layer img {
    width: 100%; height: 100%; object-fit: cover; opacity: 0.06;
  }
  .foreground-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    padding: var(--safe-margin);
    display: flex; flex-direction: column;
  }
  .logo {
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--brand-primary); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 32px;
  }
  .headline {
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 28px; font-weight: 600;
    color: var(--brand-primary); line-height: 1.2;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px; color: var(--brand-secondary);
    margin-bottom: 32px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    flex: 1;
    align-content: center;
  }
  .feature-item {
    padding: 16px;
    border-left: 3px solid var(--brand-accent);
  }
  .feature-value {
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 24px; font-weight: 700;
    color: var(--brand-primary); line-height: 1.1;
  }
  .feature-label {
    font-size: 13px; color: var(--brand-secondary);
    margin-top: 4px;
  }
  .product-slot {
    position: absolute; bottom: var(--safe-margin);
    right: var(--safe-margin);
    width: 120px; height: 120px;
  }
  .product-slot img {
    max-width: 100%; max-height: 100%; object-fit: contain;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: var(--brand-accent); z-index: 2;
  }
</style>
</head>
<body>
  <div class="background-layer">{background_content}</div>
  <div class="foreground-layer">
    <div class="logo">{brand_name}</div>
    <div class="headline">{headline}</div>
    <div class="subtitle">{subtitle}</div>
    <div class="feature-grid">
      <div class="feature-item">
        <div class="feature-value">42dB</div>
        <div class="feature-label">自适应降噪</div>
      </div>
      <div class="feature-item">
        <div class="feature-value">38h</div>
        <div class="feature-label">超长续航</div>
      </div>
      <div class="feature-item">
        <div class="feature-value">285g</div>
        <div class="feature-label">轻盈佩戴</div>
      </div>
      <div class="feature-item">
        <div class="feature-value">0.2s</div>
        <div class="feature-label">低延迟</div>
      </div>
    </div>
    <div class="product-slot">
      <img src="{product_image}" alt="{brand_name} product" data-asset-source="product_facts">
    </div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
