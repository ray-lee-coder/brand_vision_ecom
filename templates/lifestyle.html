<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --brand-primary: {primary};
    --brand-secondary: {secondary};
    --brand-accent: {accent};
    --brand-background: {background};
    --brand-heading-font: "{heading_font}";
    --brand-body-font: "{body_font}";
    --safe-margin: {safe_margin}px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {width}px; height: {height}px;
    overflow: hidden; position: relative;
    font-family: var(--brand-body-font), sans-serif;
  }
  .background-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    {background_style}
    z-index: 0;
  }
  .background-layer img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0) 100%);
    z-index: 1;
  }
  .foreground-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 2;
    padding: var(--safe-margin);
    display: flex; align-items: flex-end;
  }
  .content-block {
    max-width: 50%; padding-bottom: 60px;
  }
  .logo {
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 13px; font-weight: 700;
    color: #fff; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .headline {
    font-family: var(--brand-heading-font), sans-serif;
    font-size: 36px; font-weight: 600;
    color: #fff; line-height: 1.15;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px; color: rgba(255,255,255,0.8);
    line-height: 1.5; margin-bottom: 24px;
  }
  .product-slot {
    position: absolute; right: var(--safe-margin);
    bottom: var(--safe-margin);
    width: 45%; height: 65%;
    display: flex; justify-content: center; align-items: flex-end;
  }
  .product-slot img {
    max-width: 100%; max-height: 100%; object-fit: contain;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: var(--brand-accent); z-index: 3;
  }
</style>
</head>
<body>
  <div class="background-layer">{background_content}</div>
  <div class="overlay"></div>
  <div class="foreground-layer">
    <div class="content-block">
      <div class="logo">{brand_name}</div>
      <div class="headline">{headline}</div>
      <div class="subtitle">{subtitle}</div>
    </div>
    <div class="product-slot">
      <img src="{product_image}" alt="{brand_name} product" data-asset-source="product_facts">
    </div>
  </div>
  <div class="accent-bar"></div>
</body>
</html>
